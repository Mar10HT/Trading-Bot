<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade Bot Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        surface: '#0a0a0a',
                        'surface-alt': '#141414',
                        'surface-card': '#1a1a1a',
                        'surface-hover': '#222222',
                        border: '#2a2a2a',
                        accent: '#4d7c6f',
                        'accent-light': '#5a9485',
                        profit: '#22c55e',
                        loss: '#ef4444',
                        muted: '#737373',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-surface text-gray-200 min-h-screen font-mono text-sm">
    <!-- Header -->
    <header class="border-b border-border px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <h1 class="text-lg font-semibold text-white">Trade Bot</h1>
            <span id="status-badge" class="px-2 py-0.5 rounded text-xs font-medium bg-gray-700 text-gray-400">
                OFFLINE
            </span>
            <span id="mode-badge" class="px-2 py-0.5 rounded text-xs font-medium bg-accent/20 text-accent-light">
                PAPER
            </span>
        </div>
        <div class="flex gap-2">
            <button onclick="stopBot()" class="px-3 py-1.5 rounded bg-surface-hover border border-border text-gray-300 hover:bg-surface-card text-xs">
                Stop
            </button>
            <button onclick="killBot()" class="px-3 py-1.5 rounded bg-red-900/30 border border-red-800/50 text-red-400 hover:bg-red-900/50 text-xs">
                Kill Switch
            </button>
        </div>
    </header>

    <main class="p-6 max-w-7xl mx-auto space-y-6">
        <!-- Summary Cards -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div class="bg-surface-card rounded-xl border border-border p-4">
                <div class="text-muted text-xs uppercase tracking-wider mb-1">Total P&L</div>
                <div id="total-pnl" class="text-2xl font-semibold text-white">$0.00</div>
            </div>
            <div class="bg-surface-card rounded-xl border border-border p-4">
                <div class="text-muted text-xs uppercase tracking-wider mb-1">Realized</div>
                <div id="realized-pnl" class="text-2xl font-semibold text-white">$0.00</div>
            </div>
            <div class="bg-surface-card rounded-xl border border-border p-4">
                <div class="text-muted text-xs uppercase tracking-wider mb-1">Total Fees</div>
                <div id="total-fees" class="text-2xl font-semibold text-white">$0.00</div>
            </div>
            <div class="bg-surface-card rounded-xl border border-border p-4">
                <div class="text-muted text-xs uppercase tracking-wider mb-1">Active Pairs</div>
                <div id="active-pairs" class="text-2xl font-semibold text-white">0</div>
            </div>
        </div>

        <!-- Grid Strategies -->
        <div class="bg-surface-card rounded-xl border border-border">
            <div class="px-4 py-3 border-b border-border">
                <h2 class="text-white font-medium">Grid Strategies</h2>
            </div>
            <div id="strategies-container" class="p-4">
                <div class="text-muted text-center py-8">No active strategies</div>
            </div>
        </div>

        <!-- Trade History -->
        <div class="bg-surface-card rounded-xl border border-border">
            <div class="px-4 py-3 border-b border-border flex items-center justify-between">
                <h2 class="text-white font-medium">Recent Trades</h2>
                <span id="trade-count" class="text-muted text-xs">0 trades</span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-xs">
                    <thead>
                        <tr class="text-muted uppercase tracking-wider border-b border-border">
                            <th class="text-left px-4 py-2">Time</th>
                            <th class="text-left px-4 py-2">Pair</th>
                            <th class="text-left px-4 py-2">Side</th>
                            <th class="text-right px-4 py-2">Price</th>
                            <th class="text-right px-4 py-2">Amount</th>
                            <th class="text-right px-4 py-2">Fee</th>
                            <th class="text-right px-4 py-2">Level</th>
                        </tr>
                    </thead>
                    <tbody id="trades-body">
                        <tr>
                            <td colspan="7" class="text-center text-muted py-8">No trades yet</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
