# Trading Bot Configuration
# Mode: paper | testnet | live
mode: "paper"

# Pairs to trade
pairs:
  - pair: "BTC/USDT"
    lower_price: 72000.0
    upper_price: 76000.0
    num_grids: 5
    investment: 45.0  # USDT allocated to this pair

# Risk management
risk:
  max_total_investment: 50.0
  min_order_value: 11.0        # Must exceed Binance MIN_NOTIONAL (~$10)
  max_drawdown_pct: 20.0       # Kill switch at 20% loss
  max_drawdown_absolute: 10.0  # Kill switch at $10 absolute loss
  reserve_pct: 10.0            # Keep 10% as untradeable reserve

# Exchange settings
exchange:
  fee_rate: 0.001              # 0.1% Binance default fee
  poll_interval_seconds: 10    # Price check interval for paper/live

# Dashboard
dashboard:
  host: "127.0.0.1"
  port: 8080

# Logging
logging:
  level: "INFO"                # DEBUG for price ticks, INFO for trades
  file: "data/trade_bot.log"
